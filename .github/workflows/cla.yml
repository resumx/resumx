name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, closed]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    if: |
      (github.event_name == 'pull_request_target' && github.event.action != 'closed')
      || (github.event_name == 'issue_comment' && github.event.comment.body == 'recheck')
    runs-on: ubuntu-latest
    steps:
      - uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: .github/cla-signatures.json
          path-to-document: .github/CLA.md
          branch: main
          allowlist: dependabot[bot],renovate[bot],github-actions[bot]
          custom-notsigned-prcomment: >
            Thank you for your pull request! Before we can merge it, you need
            to sign the [Contributor License Agreement](.github/CLA.md).
            To sign, please comment **I have read the CLA Document and I hereby
            sign the CLA** on this PR.
          custom-pr-sign-comment: I have read the CLA Document and I hereby sign the CLA
