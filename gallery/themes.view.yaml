oxford:
  style:
    font-family: "'Palatino Linotype', 'Palatino', 'Georgia', 'Times New Roman', serif"
    name-caps: small-caps
    page-margin-x: 0.3in
    section-title-caps: small-caps
  css: |
    section > :not(h2) {
      margin-left: 11px;
      margin-right: 14px;
    }

seattle:
  style:
    font-family: "'Segoe UI', 'Helvetica Neue', sans-serif"
    name-color: '#004F90'
    name-caps: normal
    name-weight: bold
    name-size: 1.8rem
    section-title-color: '#004F90'
    section-title-size: 1.3rem;
    section-title-border: 1.5px solid var(--section-title-color)
    bullet-style: circle
  css: |
    h2 {
      display: flex;
      align-items: baseline;
      gap: 3px;
      border-bottom: none;
    }

    a {
      font-style: italic;
    }

    h2::after {
      content: '';
      flex: 1;
      border-bottom: var(--section-title-border);
    }

    .date-range, time {
      font-style: italic;
      font-weight: normal;
    }

tokyo:
  style:
    font-family: "'Source Sans 3', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif"
    name-caps: normal
    name-weight: bold
    name-size: 1.5rem
    section-title-size: 1.1rem
    section-gap: 30px
    section-title-border: 1.5px solid var(--section-title-color)
    entry-title-size: 1rem
  css: |
    .date-range, time {
      font-style: italic;
      font-weight: normal;
    }

zurich:
  style:
    font-family: "'Times', serif"
    name-caps: normal
